<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="40%" stop-color="#1a0505"/>
      <stop offset="70%" stop-color="#2a0000"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="stars-glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="250" height="350" rx="12" fill="url(#bg)"/>
  <rect width="250" height="350" rx="12" fill="url(#stars-glow)"/>

  <!-- Star field dots -->
  <circle cx="40" cy="30" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="90" cy="55" r="0.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="160" cy="25" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="210" cy="60" r="0.7" fill="#ffffff" opacity="0.3"/>
  <circle cx="30" cy="90" r="0.9" fill="#ffffff" opacity="0.35"/>
  <circle cx="195" cy="100" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="70" cy="295" r="0.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="185" cy="310" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="220" cy="280" r="0.7" fill="#ffffff" opacity="0.25"/>

  <!-- Outer border (red) -->
  <rect x="8" y="8" width="234" height="334" rx="9" fill="none" stroke="#cc0000" stroke-width="1.5" opacity="0.6"/>
  <rect x="14" y="14" width="222" height="322" rx="7" fill="none" stroke="#cc0000" stroke-width="0.5" opacity="0.2"/>

  <!-- Lightsaber cross shape -->
  <!-- Vertical blade -->
  <rect x="122" y="55" width="6" height="140" rx="3" fill="#cc0000" opacity="0.55"/>
  <!-- Horizontal guard -->
  <rect x="88" y="108" width="74" height="5" rx="2.5" fill="#cc0000" opacity="0.4"/>
  <!-- Hilt -->
  <rect x="120" y="195" width="10" height="30" rx="2" fill="#888888" opacity="0.4"/>

  <!-- Horizontal rule -->
  <line x1="35" y1="240" x2="215" y2="240" stroke="#cc0000" stroke-width="0.5" opacity="0.3"/>

  <!-- Labels -->
  <text x="125" y="265" font-family="Arial Narrow, Arial, sans-serif" font-size="10" font-weight="bold" fill="#cc0000" opacity="0.7" text-anchor="middle" letter-spacing="2">STAR WARS</text>
  <text x="125" y="280" font-family="Arial, sans-serif" font-size="7.5" fill="#ffffff" opacity="0.35" text-anchor="middle" letter-spacing="1">UNLIMITED</text>
  <text x="125" y="308" font-family="Arial, sans-serif" font-size="7.5" fill="#ffffff" opacity="0.25" text-anchor="middle" letter-spacing="0.5">REPLACE WITH REAL IMAGE</text>
</svg>
